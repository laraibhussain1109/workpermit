<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Permit Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>🛠️ Work Permit Portal</h1>
    <button id="logoutBtn" class="ghost hidden">Logout</button>
  </header>

  <main class="container">
    <section id="authSection" class="panel auth-panel">
      <h2>Login</h2>
      <p class="muted">Use demo accounts: <strong>user/user123</strong> or <strong>admin/admin123</strong></p>
      <form id="loginForm" class="grid two">
        <label>
          Username
          <input type="text" id="username" required />
        </label>
        <label>
          Password
          <input type="password" id="password" required />
        </label>
        <button class="accent" type="submit">Sign In</button>
      </form>
      <p id="authError" class="error"></p>
    </section>

    <section id="userSection" class="hidden">
      <div class="panel">
        <h2>Create Work Permit Request</h2>
        <form id="workPermitForm" class="form-grid">
          <h3 class="full">Permit Details</h3>

          <label>
            Permit Valid From
            <input type="date" name="validFrom" required />
          </label>
          <label>
            Permit Valid To
            <input type="date" name="validTo" required />
          </label>
          <label class="full">
            Location of Work
            <input type="text" name="location" placeholder="Plant / Unit / Area" required />
          </label>

          <fieldset class="full check-grid">
            <legend>Description of Work</legend>
            <label><input type="checkbox" name="workType" value="Hot Work" /> Hot Work</label>
            <label><input type="checkbox" name="workType" value="Excavation/Civil" /> Excavation/Civil Work</label>
            <label><input type="checkbox" name="workType" value="Pipeline Work" /> Pipeline Work</label>
            <label><input type="checkbox" name="workType" value="Confined Space" /> Confined Space Entry</label>
            <label><input type="checkbox" name="workType" value="Height Work" /> Height Work (1.8m+)</label>
            <label><input type="checkbox" name="workType" value="Electrical" /> Electrical</label>
            <label><input type="checkbox" name="workType" value="Emergency Machinery" /> Emergency Machinery</label>
            <label><input type="checkbox" name="workType" value="Others" /> Others</label>
          </fieldset>

          <label class="full">
            Potential Hazards
            <textarea name="hazards" rows="2" required></textarea>
          </label>
          <label class="full">
            Precautions to be Taken
            <textarea name="precautions" rows="2" required></textarea>
          </label>
          <label class="full">
            Legal Requirements (Statutory)
            <textarea name="legalReq" rows="2"></textarea>
          </label>
          <label class="full">
            Persons to be Notified
            <input type="text" name="notify" />
          </label>

          <h3 class="full">Contractor & Work Area</h3>
          <label>
            Contractor Company Name
            <input type="text" name="contractorName" required />
          </label>
          <label>
            Contact Person
            <input type="text" name="contactPerson" required />
          </label>

          <div class="phone-group">
            <label>
              Country Code
              <select name="countryCode" id="countryCode" required></select>
            </label>
            <label>
              Mobile Number
              <input type="tel" name="mobile" id="mobile" placeholder="Enter number" required />
            </label>
          </div>
          <label>
            Work Area / Department
            <input type="text" name="department" required />
          </label>
          <label>
            Shift Start
            <input type="datetime-local" name="startTime" required />
          </label>
          <label>
            Shift End
            <input type="datetime-local" name="endTime" required />
          </label>
          <label class="full">
            Specific Exact Location
            <input type="text" name="exactLocation" required />
          </label>

          <h3 class="full">Safety Checklist</h3>
          <fieldset class="full check-grid">
            <legend>PPE Required</legend>
            <label><input type="checkbox" name="ppe" value="Full Body Harness" /> Full Body Harness</label>
            <label><input type="checkbox" name="ppe" value="Ear Plug" /> Ear Plug</label>
            <label><input type="checkbox" name="ppe" value="Goggle / Face Shield" /> Goggle / Face Shield</label>
            <label><input type="checkbox" name="ppe" value="Dust Mask" /> Dust Mask</label>
            <label><input type="checkbox" name="ppe" value="Hand Gloves" /> Hand Gloves</label>
            <label><input type="checkbox" name="ppe" value="Apron & Leg Guard" /> Apron & Leg Guard</label>
            <label><input type="checkbox" name="ppe" value="Heat Resistant Suit" /> Heat Resistant Suit</label>
            <label><input type="checkbox" name="ppe" value="Fitness Certificate" /> Fitness Certificate</label>
          </fieldset>

          <label class="full">
            Any Other Requirement
            <input type="text" name="otherRequirement" />
          </label>

          <button class="accent full" type="submit">Submit Work Permit Request</button>
        </form>
        <p id="formError" class="error"></p>
      </div>

      <div class="panel">
        <h2>My Requests</h2>
        <div id="userRequests" class="cards"></div>
      </div>
    </section>

    <section id="adminSection" class="hidden panel">
      <h2>Admin Panel - Review Requests</h2>
      <p class="muted">Approve or reject pending work permit requests.</p>
      <div id="adminRequests" class="cards"></div>
    </section>
  </main>

  <template id="govIdTemplate">
    <div class="gov-card">
      <h4>Government ID Verification (Required after Approval)</h4>
      <form class="govIdForm form-grid compact" novalidate>
        <label>
          ID Type
          <select name="idType" required>
            <option value="">Select ID Type</option>
            <option>Adhaar Card</option>
            <option>Voter ID Card</option>
            <option>Driver's License</option>
            <option>Passport</option>
            <option>Ration Card</option>
          </select>
        </label>
        <label>
          ID Number
          <input type="text" name="idNumber" required />
        </label>

        <label class="full">
          Upload Photo
          <input type="file" name="photoUpload" accept="image/*" />
        </label>

        <div class="camera full">
          <video playsinline autoplay muted></video>
          <canvas class="hidden"></canvas>
          <img class="capture-preview hidden" alt="Captured ID" />
          <div class="camera-actions">
            <button type="button" class="ghost startCamera">Start Camera</button>
            <button type="button" class="ghost snapPhoto">Capture Photo</button>
            <button type="button" class="ghost stopCamera">Stop Camera</button>
          </div>
        </div>

        <button type="submit" class="accent full">Submit Government ID</button>
        <p class="error govError full"></p>
      </form>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
